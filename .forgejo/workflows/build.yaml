on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    strategy:
      matrix:
        include:
          - system: x86_64-linux
          - system: aarch64-linux
    runs-on: "nix-${{ matrix.system }}"
    steps:
      - uses: actions/checkout@v3

      - name: Build CI set
        run: nix --extra-experimental-features 'nix-command flakes' build .#hydraJobs.${{ matrix.system }}.ci -L --keep-failed

  ci-next:
    strategy:
      matrix:
        include:
          - system: x86_64-linux
          - system: aarch64-linux
    runs-on: "nix-${{ matrix.system }}"
    steps:
      - uses: actions/checkout@v3

      - name: Build CI next set
        run: nix --extra-experimental-features 'nix-command flakes' build .#hydraJobs.${{ matrix.system }}.ci-next -L --keep-failed
